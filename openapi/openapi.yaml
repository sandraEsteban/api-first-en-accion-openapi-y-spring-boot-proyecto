openapi: 3.0.3
info:
  title: Sample Ecommerce App
  description: >
    'This is a ***sample ecommerce app API***.  You can find out more about Swagger at [swagger.io](http://swagger.io).
    Description supports markdown markup. For example, you can use the `inline code` using back ticks.'
  termsOfService: https://github.com/PacktPublishing/Modern-API-Development-with-Spring-and-Spring-Boot/blob/master/LICENSE
  contact:
    email: support@packtpub.com
  license:
    name: MIT
    url: https://github.com/PacktPublishing/Modern-API-Development-with-Spring-and-Spring-Boot/blob/master/LICENSE
  version: 1.0.0
externalDocs:
  description: Any document link you want to generate along with API.
  url: http://swagger.io
servers:
  - url: https://ecommerce.swagger.io/v2
tags:
  - name: cart
    description: Everything about cart
    externalDocs:
      description: Find out more (extra document link)
      url: http://swagger.io
  - name: order
    description: Operation about orders
  - name: customer
    description: Operations about user's persona customer
  - name: address
    description: Operations about user's address
  - name: payment
    description: Operations about payments
  - name: shipment
    description: Operations about shippings
  - name: product
    description: Operations about products
  - name: card
    description: Operations about cards
paths:
  /api/v1/carts/{customerId}:
    $ref: ./paths/carts-customerId.yaml
  /api/v1/carts/{customerId}/items:
    $ref: ./paths/carts-customerId-items.yaml
  /api/v1/carts/{customerId}/items/{itemId}:
    $ref: ./paths/carts-customerId-items-itemId.yaml
  /api/v1/orders:
    $ref: ./paths/orders.yaml
  /api/v1/orders/{id}:
    $ref: ./paths/orders-id.yaml
  /api/v1/customers:
    $ref: ./paths/customers.yaml
  /api/v1/customers/{id}:
    $ref: ./paths/customers-id.yaml
  /api/v1/customers/{id}/cards:
    $ref: ./paths/customers-id-cards.yaml
  /api/v1/customers/{id}/addresses:
    $ref: ./paths/customers-id-addresses.yaml
  /api/v1/addresses:
    $ref: ./paths/addresses.yaml
  /api/v1/addresses/{id}:
    $ref: ./paths/addresses-id.yaml
  /api/v1/cards:
    $ref: ./paths/cards.yaml
  /api/v1/cards/{id}:
    $ref: ./paths/cards-id.yaml
  /api/v1/payments:
    $ref: ./paths/payments.yaml
  /api/v1/shipping:
    $ref: ./paths/shipping.yaml
  /api/v1/products:
    $ref: ./paths/products.yaml
  /api/v1/products/{id}:
    $ref: ./paths/products-id.yaml
components:
  schemas:
    Cart:
      $ref: ./components/schemas/Cart.yaml
    Item:
      $ref: ./components/schemas/Item.yaml
    Order:
      $ref: ./components/schemas/Order.yaml
    AddAddressReq:
      $ref: ./components/schemas/AddAddressReq.yaml
    Address:
      $ref: ./components/schemas/Address.yaml
    Card:
      $ref: ./components/schemas/Card.yaml
    AddCardReq:
      $ref: ./components/schemas/AddCardReq.yaml
    Payment:
      $ref: ./components/schemas/Payment.yaml
    Shipment:
      $ref: ./components/schemas/Shipment.yaml
    ShippingReq:
      $ref: ./components/schemas/ShippingReq.yaml
    User:
      $ref: ./components/schemas/User.yaml
    NewOrder:
      $ref: ./components/schemas/NewOrder.yaml
    URI:
      $ref: ./components/schemas/URI.yaml
    Authorization:
      $ref: ./components/schemas/Authorization.yaml
    PaymentReq:
      $ref: ./components/schemas/PaymentReq.yaml
    CustomerInfoOnCard:
      $ref: ./components/schemas/CustomerInfoOnCard.yaml
    Product:
      $ref: ./components/schemas/Product.yaml
    Tag:
      $ref: ./components/schemas/Tag.yaml
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []